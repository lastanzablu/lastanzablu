<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Stanza Blu</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #1511ac;
    }

    #panorama {
      width: 100%;
      height: 100vh;
    }

    .word img {
      width: 300px;
      opacity: 0.9;
    }

    #startGyro {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 999;
      padding: 10px;
      background: white;
      border: none;
    }
  </style>
</head>

<body>

<button id="startGyro">Attiva movimento</button>

<div id="panorama"></div>

<script>
var viewer = pannellum.viewer('panorama', {
    type: 'equirectangular',
    panorama: 'sfondo.jpg',

    autoLoad: true,
    showControls: false,

    hfov: 60,

    hotSpots: [
        { pitch: 5, yaw: 0, cssClass: 'word', createTooltipFunc: parola, createTooltipArgs: "parola1.png" },
        { pitch: 0, yaw: 30, cssClass: 'word', createTooltipFunc: parola, createTooltipArgs: "parola2.png" },
        { pitch: -5, yaw: -30, cssClass: 'word', createTooltipFunc: parola, createTooltipArgs: "parola3.png" },
        { pitch: 10, yaw: 60, cssClass: 'word', createTooltipFunc: parola, createTooltipArgs: "parola4.png" }
    ]
});

function parola(div, imgPath) {
    var img = document.createElement("img");
    img.src = imgPath;
    div.appendChild(img);
}

document.getElementById("startGyro").addEventListener("click", function() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
        .then(function(response) {
            if (response === 'granted') {
                viewer.startOrientation();
            }
        });
    } else {
        viewer.startOrientation();
    }
});
</script>

</body>
</html>
