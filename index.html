<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Stanza Blu</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #1511ac;
    }

    #panorama {
      width: 100%;
      height: 100vh;
    }

    .word img {
      width: 300px;
      opacity: 0.9;
    }

    #startGyro {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 999;
      padding: 10px;
      background: white;
      border: none;
    }
  </style>
</head>

<body>

<button id="startGyro">Attiva movimento</button>

<div id="panorama"></div>

<script>

// ------------------------
// 1. LISTA PAROLE
// ------------------------

var immagini = [
  "parola1.png",
  "parola2.png",
  "parola3.png",
  "parola4.png",
  "parola5.png",
  "parola6.png",
  "parola7.png",
  "parola8.png"
];

// ------------------------
// 2. CREAZIONE AUTOMATICA
// ------------------------

var hotSpots = [];

for (let i = 0; i < immagini.length; i++) {

    // distribuzione casuale davanti
    let yaw = -60 + Math.random() * 120;

    // distribuzione verticale casuale
    let pitch = -30 + Math.random() * 60;

    hotSpots.push({
        pitch: pitch,
        yaw: yaw,
        cssClass: 'word',
        createTooltipFunc: parola,
        createTooltipArgs: immagini[i]
    });
}

// ------------------------
// 3. VIEWER
// ------------------------

var viewer = pannellum.viewer('panorama', {
    type: 'equirectangular',
    panorama: 'sfondo.jpg',

    autoLoad: true,
    showControls: false,

    hfov: 60,

    hotSpots: hotSpots
});

// ------------------------
// 4. FUNZIONE PAROLA
// ------------------------

function parola(div, imgPath) {
    var img = document.createElement("img");
    img.src = imgPath;
    div.appendChild(img);
}

// ------------------------
// 5. GIROSCOPIO
// ------------------------

document.getElementById("startGyro").addEventListener("click", function() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
        .then(function(response) {
            if (response === 'granted') {
                viewer.startOrientation();
            }
        });
    } else {
        viewer.startOrientation();
    }
});

</script>

</body>
</html>
